<div class="centered-container">
  <div class="login-card">
    <h2>Registra il tuo dispositivo</h2>
    <p style="color:#666; font-size:14px; margin-bottom:8px;">
      Per timbrare le presenze, il sistema usa la biometria del tuo dispositivo
      (Touch ID, Face ID, Windows Hello).
    </p>
    <p style="color:#aaa; font-size:13px; margin-bottom:28px;">
      Ti verrà chiesto di confermare la tua identità con il sensore biometrico.
    </p>

    @if (error) {
      <p class="modal-error">{{ error }}</p>
    }

    <button class="btn-login" (click)="registerBiometrics()" [disabled]="loading">
      {{ loading ? 'Attendere...' : 'Registra dispositivo' }}
    </button>
  </div>
</div>
